<!DOCTYPE html>
<html lang ="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InternTrack Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

<!--NAVBAR-->
<nav class="bg-white shadow-sm px-8 py-4 flex justify-between items-center">
    <h1 class="text-xl font-bold">InternTrack Pro</h1>
    <div class="flex gap-4">
        <button class="text-gray-600 hover:text-blue-600 font-medium">
            Log In
        </button>
        <button class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">
            Get started
        </button>
    </div>
</nav>
<!--HERO SECTION-->
<main class="max-w-4xl mx-auto mt-24 text-center px-6">
    <h2 class="text-5xl font-bold text-gray-800 mb-6 leading-tight">
        Track Every Application. <br/>Land your Internship
    </h2>
    <p class="text-xl text-gray-500 mb-10 max-w-2xl mx-auto">
        Stop losing track in spreadsheets. InternTrack Pro gives you
        one clean dashboard to manage your entire internship search.
    </p>
    <button class="bg-blue-600 text-white px-8 py-4 rounded-lg text-lg hover:bg-blue-700 shadow-lg hover:shadow-xl transition">
        Start Tracking Free
    </button>
</main>
<!--STATS SECTION-->
<section class="max-w-4xl mx-auto mt-24 grid grid-cols-1 md:grid grid-cols-3 gap-8 px-6">
    <div class="bg-white rounded-xl p-6 text-center shadow-sm">
        <p class="text-4xl font-bold text-blue-600">49</p>
        <p class="text-gray-500 mt-2">Applications Tracked</p>
    </div>
    <div class="bg-white rounded-xl p-6 text-center shadow-sm">
        <p class="text-4xl font-bold text-blue-600">10</p>
        <p class="text-gray-500 mt-2">Interviews Secured</p>
    </div>
    <div class="bg-white rounded-xl p-6 text-center shadow-sm">
        <p class="text-4xl font-bold text-blue-600">1</p>
        <p class="text-gray-500 mt-2">Offer Received</p>
    </div>
</section>
</body>
</html>
